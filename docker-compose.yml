services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-redline}
      POSTGRES_USER:     ${POSTGRES_USER:-redline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redline}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redline

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - redline

  # ─── Rails Application ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV:            production
      RAILS_LOG_TO_STDOUT:  "true"
      SECRET_KEY_BASE:      ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      DATABASE_URL:         postgresql://${POSTGRES_USER:-redline}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB:-redline}
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379/0
      LIVEKIT_URL:          ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY:      ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET:   ${LIVEKIT_API_SECRET:-devsecret}
      DEVISE_MAILER_FROM:   ${DEVISE_MAILER_FROM:-redline@localhost}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - rails_storage:/rails/storage
    command: >
      bash -c "bundle exec rails db:prepare &&
               bundle exec rails server -b 0.0.0.0 -p 3000"
    networks:
      - redline

  # ─── LiveKit SFU ──────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command: ['exec /livekit-server --config-body "$$(cat /etc/livekit.yaml)"']
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"       # WebSocket + HTTP
      - "7881:7881"       # RTC TCP
      - "7882:7882/udp"   # RTC UDP
    networks:
      - redline

volumes:
  postgres_data:
  redis_data:
  rails_storage:

networks:
  redline:
    driver: bridge
